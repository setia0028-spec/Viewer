<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>JSONL Chat Viewer & Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }

        body.modal-open {
            overflow: hidden;
        }

        .header {
            background: #16213e;
            color: #e0e0e0;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #0f3460;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 16px;
            font-weight: 600;
            margin-right: auto;
        }

        .btn {
            background: #0f3460;
            color: #e0e0e0;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
            border: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            white-space: nowrap;
        }

        .btn:active {
            background: #1a4a8a;
        }

        .btn.accent {
            background: #1a5c2a;
        }
        .btn.accent:active {
            background: #267a3a;
        }

        .btn.download {
            background: #7a4a1a;
        }
        .btn.download:active {
            background: #9a5a2a;
        }

        input[type="file"] {
            display: none;
        }

        /* === MODAL === */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 100;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            max-height: 80dvh;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            z-index: 101;
        }

        .modal-content h3 {
            color: #e0e0e0;
            font-size: 16px;
            flex-shrink: 0;
        }

        .modal-content textarea {
            width: 100%;
            height: 300px;
            background: #0a0e1a;
            color: #e0e0e0;
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 12px;
            font-family: monospace;
            font-size: 12px;
            resize: vertical;
            flex-shrink: 1;
        }

        /* === EDIT OVERLAY === */
        .edit-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 150;
            flex-direction: column;
            padding: 16px;
        }

        .edit-overlay.active {
            display: flex;
        }

        .edit-overlay .edit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .edit-overlay .edit-label {
            color: #a0b4d0;
            font-size: 13px;
            font-weight: 600;
        }

        .edit-overlay .edit-actions {
            display: flex;
            gap: 8px;
        }

        .edit-overlay textarea {
            flex: 1;
            width: 100%;
            background: #0a0e1a;
            color: #e0e0e0;
            border: 2px solid #f0c040;
            border-radius: 12px;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        .edit-overlay .edit-hint {
            color: #6b7d95;
            font-size: 11px;
            text-align: center;
            margin-top: 8px;
            flex-shrink: 0;
        }

        /* === CHAT CONTAINER === */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }

        .conversation-block {
            background: #16213e;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #0f3460;
            flex-shrink: 0;
        }

        .conversation-header {
            background: #0f3460;
            padding: 10px 16px;
            font-size: 12px;
            color: #a0b4d0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge.chosen {
            background: #1a5c2a;
            color: #4ade80;
        }

        .badge.rejected {
            background: #5c1a1a;
            color: #f87171;
        }

        .messages {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
            word-break: break-word;
            cursor: pointer;
            transition: 0.15s;
            position: relative;
        }

        .message:active {
            filter: brightness(1.3);
            transform: scale(0.98);
        }

        .message.edited {
            /* indikator kecil bahwa pesan sudah diedit */
        }

        .message .edit-icon {
            display: none;
            position: absolute;
            top: 4px;
            right: 8px;
            font-size: 10px;
            opacity: 0.6;
        }

        .message:hover .edit-icon,
        .message:active .edit-icon {
            display: block;
        }

        .message.human {
            background: #0f3460;
            color: #e0e0e0;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            background: #1a3a5c;
            color: #d0d8e8;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.assistant-chosen {
            background: #1a4a3a;
            color: #c8f0d8;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #2d7a4a;
        }

        .message.assistant-rejected {
            background: #4a1a1a;
            color: #f0c8c8;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #7a2d2d;
        }

        .message .edited-badge {
            display: inline-block;
            background: #f0c040;
            color: #1a1a2e;
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 6px;
            font-weight: 700;
            vertical-align: middle;
        }

        .comparison-row {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .comparison-col {
            flex: 1;
            min-width: 140px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .comparison-label {
            font-size: 11px;
            font-weight: 600;
            text-align: center;
            padding: 4px;
            border-radius: 6px;
        }

        .comparison-label.chosen {
            background: #1a5c2a;
            color: #4ade80;
        }

        .comparison-label.rejected {
            background: #5c1a1a;
            color: #f87171;
        }

        .no-file {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6b7d95;
            font-size: 16px;
            text-align: center;
            padding: 40px;
        }

        .empty-message {
            color: #8b9db5;
            font-style: italic;
            font-size: 13px;
            text-align: center;
            padding: 8px;
        }

        .loading {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6b7d95;
            font-size: 16px;
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #0f3460;
            border-radius: 3px;
        }

        /* === TOAST === */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a5c2a;
            color: #e0e0e0;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 200;
            animation: fadeInOut 2s ease;
            pointer-events: none;
            text-align: center;
            max-width: 90%;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            20% { opacity: 1; transform: translateX(-50%) translateY(0); }
            80% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>💬 JSONL Chat Editor</h1>
        <label class="btn" for="fileInput">
            📂 Buka
            <input type="file" id="fileInput" accept=".jsonl,.json,.txt">
        </label>
        <button class="btn" onclick="openPasteModal()">📋 Tempel</button>
        <button class="btn download" onclick="downloadJSONL()">📥 Simpan</button>
    </div>

    <!-- Modal Tempel -->
    <div class="modal" id="pasteModal">
        <div class="modal-content">
            <h3>Tempel isi file .jsonl di sini</h3>
            <textarea id="pasteArea" placeholder="Tempel seluruh isi file .jsonl di sini..."></textarea>
            <div style="display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;">
                <button class="btn" onclick="closePasteModal()">Batal</button>
                <button class="btn accent" onclick="loadFromPaste()">Muat</button>
            </div>
        </div>
    </div>

    <!-- Overlay Edit -->
    <div class="edit-overlay" id="editOverlay">
        <div class="edit-header">
            <span class="edit-label" id="editLabel">Edit pesan</span>
            <div class="edit-actions">
                <button class="btn" onclick="cancelEdit()">Batal</button>
                <button class="btn accent" onclick="saveEdit()">✅ Simpan</button>
            </div>
        </div>
        <textarea id="editTextarea" placeholder="Ketik ulang teks di sini..."></textarea>
        <div class="edit-hint">✏️ Tekan "Simpan" untuk menyimpan perubahan</div>
    </div>

    <!-- Chat Container -->
    <div class="chat-container" id="chatContainer">
        <div class="no-file">
            Pilih file .jsonl atau tempel isinya untuk melihat dan mengedit riwayat chat
        </div>
    </div>

    <script>
        // === STATE ===
        let conversationsData = []; // array of parsed JSON objects
        let currentEditTarget = null; // { convIndex, type: 'chosen'|'rejected', turnIndex }
        let editTurnData = null; // reference to the actual turn object

        const fileInput = document.getElementById('fileInput');
        const chatContainer = document.getElementById('chatContainer');
        const pasteModal = document.getElementById('pasteModal');
        const pasteArea = document.getElementById('pasteArea');
        const editOverlay = document.getElementById('editOverlay');
        const editTextarea = document.getElementById('editTextarea');
        const editLabel = document.getElementById('editLabel');
        const body = document.body;

        // === UPLOAD FILE ===
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            chatContainer.innerHTML = '<div class="loading">⏳ Membaca file...</div>';
            try {
                const text = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.onerror = () => reject(new Error('Gagal membaca file'));
                    reader.readAsText(file, 'UTF-8');
                });
                if (!text || text.trim().length === 0) throw new Error('File kosong');
                processJSONL(text);
                showToast(`✅ ${file.name} berhasil dimuat`);
            } catch (err) {
                chatContainer.innerHTML = `<div class="no-file">❌ Gagal: ${err.message}<br><br>Coba gunakan tombol "Tempel".</div>`;
            }
            fileInput.value = '';
        });

        // === TOAST ===
        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // === MODAL PASTE ===
        function openPasteModal() {
            pasteModal.classList.add('active');
            body.classList.add('modal-open');
            pasteArea.value = '';
            setTimeout(() => pasteArea.focus(), 100);
        }

        function closePasteModal() {
            pasteModal.classList.remove('active');
            body.classList.remove('modal-open');
        }

        function loadFromPaste() {
            const text = pasteArea.value.trim();
            if (!text) { showToast('⚠️ Tempel dulu isi file JSONL-nya'); return; }
            processJSONL(text);
            closePasteModal();
            showToast('✅ Data dari tempelan berhasil dimuat');
        }

        pasteModal.addEventListener('click', function(e) {
            if (e.target === pasteModal) closePasteModal();
        });

        // === PARSER JSONL ===
        function processJSONL(rawText) {
            conversationsData = [];
            const lines = rawText.split(/\r?\n/);
            let currentJSON = '';
            for (const line of lines) {
                currentJSON += line;
                try {
                    const parsed = JSON.parse(currentJSON);
                    if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
                        if (parsed.chosen !== undefined || parsed.rejected !== undefined) {
                            conversationsData.push(parsed);
                        }
                    }
                    currentJSON = '';
                } catch (e) { currentJSON += '\n'; }
            }
            if (conversationsData.length === 0) {
                try {
                    const parsed = JSON.parse(rawText.trim());
                    if (Array.isArray(parsed)) {
                        for (const item of parsed) {
                            if (item.chosen !== undefined || item.rejected !== undefined) {
                                conversationsData.push(item);
                            }
                        }
                    } else if (parsed.chosen !== undefined || parsed.rejected !== undefined) {
                        conversationsData.push(parsed);
                    }
                } catch (e) {}
            }
            if (conversationsData.length === 0) {
                chatContainer.innerHTML = `<div class="no-file">❌ Tidak ada data valid.<br><br><small>${escapeHtml(rawText.substring(0, 200))}</small></div>`;
                return;
            }
            renderAll();
            chatContainer.scrollTop = 0;
        }

        // === PARSER CHAT ===
        function parseChatHistory(text) {
            if (!text) return [];
            let cleanText = text;
            cleanText = cleanText.replace(/\\n/g, '\n').replace(/\\t/g, '\t').replace(/\\r/g, '\r').replace(/\\"/g, '"').replace(/\\\\/g, '\\');
            const turns = [];
            const parts = cleanText.split(/\n\n(?=Human:|Assistant:)/);
            let currentRole = null, currentText = '';
            for (const part of parts) {
                if (part.startsWith('Human:')) {
                    if (currentRole) turns.push({ role: currentRole, text: currentText.trim() });
                    currentRole = 'human';
                    currentText = part.replace('Human:', '').trim();
                } else if (part.startsWith('Assistant:')) {
                    if (currentRole) turns.push({ role: currentRole, text: currentText.trim() });
                    currentRole = 'assistant';
                    currentText = part.replace('Assistant:', '').trim();
                } else if (currentRole) {
                    currentText += '\n\n' + part;
                }
            }
            if (currentRole) turns.push({ role: currentRole, text: currentText.trim() });
            return turns;
        }

        // === MEMBANGUN ULANG STRING DARI TURNS ===
        function buildChatFromTurns(turns) {
            let result = '';
            for (let i = 0; i < turns.length; i++) {
                const t = turns[i];
                const roleLabel = t.role === 'human' ? 'Human' : 'Assistant';
                if (i === 0) {
                    result += `${roleLabel}: ${t.text}`;
                } else {
                    result += `\n\n${roleLabel}: ${t.text}`;
                }
            }
            return result;
        }

        // === RENDER SEMUA ===
        function renderAll() {
            let html = '';
            conversationsData.forEach((conv, index) => {
                const chosenTurns = parseChatHistory(conv.chosen || '');
                const rejectedTurns = parseChatHistory(conv.rejected || '');

                let divergenceIndex = -1;
                const maxLen = Math.min(chosenTurns.length, rejectedTurns.length);
                for (let i = 0; i < maxLen; i++) {
                    if (chosenTurns[i].text !== rejectedTurns[i].text) {
                        divergenceIndex = i;
                        break;
                    }
                }
                if (divergenceIndex === -1) divergenceIndex = maxLen;

                html += `<div class="conversation-block">`;
                html += `<div class="conversation-header">
                    <span>📝 Percakapan #${index + 1}</span>
                    <span style="display:flex;gap:8px;">
                        <span class="badge chosen">✓ Chosen</span>
                        <span class="badge rejected">✗ Rejected</span>
                    </span>
                </div>`;
                html += `<div class="messages">`;

                // Bagian sama
                for (let i = 0; i < divergenceIndex; i++) {
                    const turn = chosenTurns[i];
                    html += `<div class="message ${turn.role}" 
                        data-conv="${index}" data-type="shared" data-turn="${i}"
                        onclick="openEditOverlay(this)">
                        ${escapeHtml(turn.text)}
                    </div>`;
                }

                // Divergensi
                if (divergenceIndex < chosenTurns.length || divergenceIndex < rejectedTurns.length) {
                    html += `<div class="comparison-row">`;

                    html += `<div class="comparison-col">
                        <div class="comparison-label chosen">✅ Terpilih (Chosen)</div>`;
                    for (let i = divergenceIndex; i < chosenTurns.length; i++) {
                        html += `<div class="message assistant-chosen" 
                            data-conv="${index}" data-type="chosen" data-turn="${i}"
                            onclick="openEditOverlay(this)">
                            ${escapeHtml(chosenTurns[i].text)}
                        </div>`;
                    }
                    if (divergenceIndex >= chosenTurns.length) {
                        html += `<div class="empty-message">(tidak ada lanjutan)</div>`;
                    }
                    html += `</div>`;

                    html += `<div class="comparison-col">
                        <div class="comparison-label rejected">❌ Ditolak (Rejected)</div>`;
                    for (let i = divergenceIndex; i < rejectedTurns.length; i++) {
                        html += `<div class="message assistant-rejected" 
                            data-conv="${index}" data-type="rejected" data-turn="${i}"
                            onclick="openEditOverlay(this)">
                            ${escapeHtml(rejectedTurns[i].text)}
                        </div>`;
                    }
                    if (divergenceIndex >= rejectedTurns.length) {
                        html += `<div class="empty-message">(tidak ada lanjutan)</div>`;
                    }
                    html += `</div>`;

                    html += `</div>`;
                }

                html += `</div></div>`;
            });
            chatContainer.innerHTML = html;
        }

        // === EDIT OVERLAY ===
        function openEditOverlay(element) {
            const convIndex = parseInt(element.dataset.conv);
            const type = element.dataset.type;
            const turnIndex = parseInt(element.dataset.turn);

            const conv = conversationsData[convIndex];

            let turns;
            if (type === 'shared') {
                // Shared = ambil dari chosen (karena sama)
                turns = parseChatHistory(conv.chosen || '');
            } else if (type === 'chosen') {
                turns = parseChatHistory(conv.chosen || '');
            } else if (type === 'rejected') {
                turns = parseChatHistory(conv.rejected || '');
            }

            if (!turns[turnIndex]) return;

            currentEditTarget = { convIndex, type, turnIndex };
            editTurnData = turns[turnIndex];

            const roleLabel = turns[turnIndex].role === 'human' ? 'Human' : 'Assistant';
            const typeLabel = type === 'chosen' ? 'Chosen' : type === 'rejected' ? 'Rejected' : 'Shared';
            editLabel.textContent = `✏️ Edit — Conv #${convIndex + 1} | ${typeLabel} | ${roleLabel}`;
            editTextarea.value = turns[turnIndex].text;
            editOverlay.classList.add('active');
            body.classList.add('modal-open');
            setTimeout(() => editTextarea.focus(), 150);
        }

        function saveEdit() {
            if (!currentEditTarget || !editTurnData) return;

            const newText = editTextarea.value;
            const { convIndex, type } = currentEditTarget;
            const conv = conversationsData[convIndex];

            // Update teks di turn yang sedang diedit
            editTurnData.text = newText;

            // Rebuild string chosen/rejected dari turns yang sudah diupdate
            if (type === 'shared' || type === 'chosen') {
                const turns = parseChatHistory(conv.chosen || '');
                // Cari turn yang sama dan update
                // Karena shared pakai turn dari chosen, kita rebuild ulang
                updateTurnsInData(conv, 'chosen', turns, currentEditTarget.turnIndex, newText);
            }
            if (type === 'shared' || type === 'rejected') {
                const turns = parseChatHistory(conv.rejected || '');
                updateTurnsInData(conv, 'rejected', turns, currentEditTarget.turnIndex, newText);
            }

            // Jika type === 'shared', update keduanya
            if (type === 'shared') {
                const chosenTurns = parseChatHistory(conv.chosen || '');
                const rejectedTurns = parseChatHistory(conv.rejected || '');
                if (chosenTurns[currentEditTarget.turnIndex]) {
                    chosenTurns[currentEditTarget.turnIndex].text = newText;
                    conv.chosen = buildChatFromTurns(chosenTurns);
                }
                if (rejectedTurns[currentEditTarget.turnIndex]) {
                    rejectedTurns[currentEditTarget.turnIndex].text = newText;
                    conv.rejected = buildChatFromTurns(rejectedTurns);
                }
            } else if (type === 'chosen') {
                const turns = parseChatHistory(conv.chosen || '');
                turns[currentEditTarget.turnIndex].text = newText;
                conv.chosen = buildChatFromTurns(turns);
            } else if (type === 'rejected') {
                const turns = parseChatHistory(conv.rejected || '');
                turns[currentEditTarget.turnIndex].text = newText;
                conv.rejected = buildChatFromTurns(turns);
            }

            cancelEdit();
            renderAll();
            showToast('✅ Perubahan disimpan');
        }

        function updateTurnsInData(conv, field, turns, turnIndex, newText) {
            if (turns[turnIndex]) {
                turns[turnIndex].text = newText;
                conv[field] = buildChatFromTurns(turns);
            }
        }

        function cancelEdit() {
            editOverlay.classList.remove('active');
            body.classList.remove('modal-open');
            currentEditTarget = null;
            editTurnData = null;
            editTextarea.value = '';
        }

        // Tutup overlay saat klik di luar textarea (tapi jangan saat klik textarea)
        editOverlay.addEventListener('click', function(e) {
            if (e.target === editOverlay) {
                if (confirm('Tutup tanpa menyimpan perubahan?')) {
                    cancelEdit();
                }
            }
        });

        // === DOWNLOAD JSONL ===
        function downloadJSONL() {
            if (conversationsData.length === 0) {
                showToast('⚠️ Tidak ada data untuk disimpan');
                return;
            }
            let output = '';
            for (const conv of conversationsData) {
                output += JSON.stringify(conv) + '\n';
            }
            const blob = new Blob([output], { type: 'application/jsonl' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'edited_output.jsonl';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('📥 File .jsonl berhasil diunduh');
        }

        // === ESCAPE HTML ===
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
